# query_rewriter 워크플로우의 예제·평가 케이스.
#
# 사용:
#   - CLI:   uv run python -m scripts.cli.query_rewriter \
#              --examples scripts/examples/rewriter.yml --example 0
#   - 스모크: uv run python -m scripts.smoke_query_rewriter
#
# 스키마는 scripts/eval.py:load_examples 참고. !regex / !regex_all 태그로
# expected 필드에 정규식을 표현한다. expected는 FIXED_NOW=2026-04-29T14:30
# 기준으로 작성되어 있다.

- id: "일:오늘"
  description: "일:오늘"
  input:
    query: "오늘 매출 알려줘"
  expected:
    rewritten: !regex "2026-04-29"

- id: "일:어제"
  description: "일:어제"
  input:
    query: "어제 매출 알려줘"
  expected:
    rewritten: !regex "2026-04-28"

- id: "주:지난주"
  description: "주:지난주"
  input:
    query: "지난주 매출 알려줘"
  expected:
    rewritten: !regex_all ["2026-04-20", "2026-04-26"]

- id: "월:지난달"
  description: "월:지난달"
  input:
    query: "지난달 매출 알려줘"
  expected:
    rewritten: !regex_all ["2026-03-01", "2026-03-31"]

- id: "최근:N일"
  description: "최근:N일"
  input:
    query: "최근 7일 매출 알려줘"
  expected:
    rewritten: !regex_all ["2026-04-22", "2026-04-29"]

- id: "년:작년"
  description: "년:작년"
  input:
    query: "작년 매출"
  expected:
    rewritten: !regex_all ["2025-01-01", "2025-12-31"]

- id: "분기:1분기"
  description: "분기:1분기"
  input:
    query: "1분기 매출"
  expected:
    rewritten: !regex_all ["2026-01-01", "2026-03-31"]

- id: "자연어:N월 N일"
  description: "자연어:N월 N일"
  input:
    query: "4월 17일 매출"
  expected:
    rewritten: !regex "2026-04-17"

- id: "coref:번역 결과 → 이거"
  description: "이거 → 직전 번역 결과 복원"
  input:
    query: "이거 일본어로도 번역해줘"
    chat_history:
      - role: human
        content: "Hello, how are you?를 한국어로 번역해줘"
      - role: ai
        content: "안녕하세요, 어떻게 지내세요?"
  expected:
    rewritten: !regex "안녕하세요|Hello"

- id: "ellipsis:동사 재사용"
  description: "오늘은? → 직전 동사(매출) 복원 + 오늘 날짜"
  input:
    query: "오늘은?"
    chat_history:
      - role: human
        content: "어제 매출 알려줘"
      - role: ai
        content: "2026-04-28 매출은 1억원입니다."
  expected:
    rewritten: !regex_all ["2026-04-29", "매출"]

- id: "독립:번역 → 수학 (오염 없음)"
  description: "독립 질문은 chat_history 무시"
  input:
    query: "3과 7을 더해줘"
    chat_history:
      - role: human
        content: "Hello를 한국어로 번역해줘"
      - role: ai
        content: "안녕하세요"
  expected:
    rewritten: !regex_all ["3.{0,5}7|7.{0,5}3", "더해|더하|덧셈|합"]
