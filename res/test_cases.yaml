eval_config:
  judge_model: "gpt-4o"
  judge_temperature: 0.0
  pass_threshold: 7.0
  agent_criteria:
    math:
      - correctness
      - step_reasoning
    translate:
      - correctness
      - fluency
      - naturalness
    sql:
      - correctness
      - query_validity
      - schema_adherence

test_cases:
  # --- Math ---
  - id: "math_simple_add"
    description: "단순 덧셈"
    target_agent: "math"
    input: "3과 7을 더해주세요"
    reference_answer: "3 + 7 = 10. 결과는 10입니다."

  - id: "math_chained"
    description: "연쇄 계산: 덧셈 후 곱셈"
    target_agent: "math"
    input: "3과 7을 더하고, 그 결과에 5를 곱해주세요"
    reference_answer: "3 + 7 = 10, 10 × 5 = 50. 최종 결과는 50입니다."

  - id: "math_divide"
    description: "나눗셈"
    target_agent: "math"
    input: "100을 4로 나눠주세요"
    reference_answer: "100 ÷ 4 = 25. 결과는 25입니다."

  # --- Translate ---
  - id: "translate_en_to_kr"
    description: "영어 → 한국어 번역"
    target_agent: "translate"
    input: "Hello, how are you?를 한국어로 번역해주세요"
    reference_answer: "안녕하세요, 어떻게 지내세요?"

  - id: "translate_kr_to_en"
    description: "한국어 → 영어 번역"
    target_agent: "translate"
    input: "'오늘 날씨가 좋습니다'를 영어로 번역해주세요"
    reference_answer: "The weather is nice today."

  # --- 케이스 레벨 criteria override 예시 ---
  - id: "translate_formal"
    description: "격식체 번역 (naturalness 강조)"
    target_agent: "translate"
    input: "'귀사의 발전을 기원합니다'를 영어로 번역해주세요"
    reference_answer: "We wish your company continued success."
    eval_criteria:
      - correctness
      - fluency
      - naturalness
      - formality

  # --- SQL ---
  - id: "sql_count_employees"
    description: "전체 직원 수 집계"
    target_agent: "sql"
    input: "전체 직원은 몇 명인가요?"
    reference_answer: "전체 직원은 500명입니다."

  - id: "sql_count_departments"
    description: "부서 수 집계"
    target_agent: "sql"
    input: "등록된 부서는 몇 개인가요?"
    reference_answer: "등록된 부서는 10개입니다."

  - id: "sql_filter_salary"
    description: "조건 필터 집계 (salary >= 50M)"
    target_agent: "sql"
    input: "연봉이 5천만원 이상인 직원은 몇 명인가요?"
    reference_answer: "연봉이 5천만원 이상인 직원은 223명입니다."

  - id: "sql_null_manager"
    description: "NULL 처리 (manager_id IS NULL)"
    target_agent: "sql"
    input: "담당 매니저가 배정되지 않은 직원은 몇 명인가요?"
    reference_answer: "담당 매니저가 배정되지 않은 직원은 32명입니다."

  - id: "sql_date_range"
    description: "날짜 범위 집계"
    target_agent: "sql"
    input: "2025년 3월에 들어온 주문은 몇 건인가요?"
    reference_answer: "2025년 3월에 들어온 주문은 557건입니다."

  # --- 복잡한 SQL (JOIN / GROUP BY / 서브쿼리) ---
  - id: "sql_join_top_dept_by_avg_salary"
    description: "부서별 평균 연봉 최고 부서 (employees ⨝ departments)"
    target_agent: "sql"
    input: "직원 평균 연봉이 가장 높은 부서는 어디인가요?"
    reference_answer: "평균 연봉이 가장 높은 부서는 마케팅입니다 (평균 약 55,015,661원)."

  - id: "sql_join_top_category_revenue"
    description: "카테고리별 매출 1위 (orders ⨝ order_items ⨝ products, 취소 제외)"
    target_agent: "sql"
    input: "취소되지 않은 주문 기준으로 매출이 가장 높은 제품 카테고리는 무엇인가요?"
    reference_answer: "매출 1위 카테고리는 식품으로, 총 매출은 약 705,999,030원입니다."

  - id: "sql_correlated_subquery_above_dept_avg"
    description: "자기 부서 평균 연봉보다 높은 직원 수 (상관 서브쿼리)"
    target_agent: "sql"
    input: "자신이 속한 부서의 평균 연봉보다 더 많이 받는 직원은 몇 명인가요?"
    reference_answer: "자신의 부서 평균 연봉보다 높은 연봉을 받는 직원은 210명입니다."

  - id: "sql_cancel_rate"
    description: "주문 취소율 (CASE WHEN 집계)"
    target_agent: "sql"
    input: "전체 주문 중 취소된 주문의 비율은 몇 퍼센트인가요?"
    reference_answer: "전체 주문 중 취소율은 약 4.5%입니다."

  - id: "sql_join_top_product_quantity"
    description: "가장 많이 팔린 제품 (3-way JOIN + GROUP BY)"
    target_agent: "sql"
    input: "취소되지 않은 주문에서 수량 기준으로 가장 많이 팔린 제품은 무엇인가요?"
    reference_answer: "가장 많이 팔린 제품은 '덤벨 719'로, 총 667개가 판매되었습니다."
